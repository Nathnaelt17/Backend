server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: gateway-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/context/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**,/api/v1/patients/**,/api/v1/doctors/**
        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/appointments/**,/api/v1/admin/appointments/**
        - id: pharmacy-service
          uri: ${PHARMACY_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/prescriptions/**
        - id: medical-records-service
          uri: ${MEDICAL_RECORDS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/records/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/audit-logs/**,/api/v1/system-config/**
        - id: hospital-service
          uri: ${HOSPITAL_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/hospitals/**

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
