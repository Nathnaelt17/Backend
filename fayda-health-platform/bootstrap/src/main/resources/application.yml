spring:
  application:
    name: fayda-health-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/fayda_health
    username: fayda
    password: fayda
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: change-me-to-a-256-bit-secret-key-for-production-use
  access-token-minutes: 30
  refresh-token-days: 7

fayda:
  api:
    base-url: https://api.fayda.gov.et
    key: ${FAYDA_API_KEY:changeme}
